name: NOVA Browser Extension Unified Pipeline

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build and publish manually, for example vX.Y.Z. Leave empty for CI dry-runs.'
        required: false
        default: ''
      version_override:
        description: 'Override version string for package build dry-runs, for example X.Y.Z.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: nova-browser-extension-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_OPTIONS: --no-deprecation
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'
  SUPPORTED_RELEASE_BROWSERS: chrome,edge,firefox

jobs:
  preflight:
    name: Repository preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/setup-extension-ci
        with:
          install-node-deps: 'false'
      - name: Run production preflight
        run: node tools/preflight.mjs
      - name: Run offline production audit
        run: node tools/offline-production-audit.mjs
      - name: Run release submission audit
        run: node tools/release-submission-audit.mjs

  quality-gates:
    name: Quality gates
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      failed: ${{ steps.quality_summary.outputs.failed }}
      summary_path: ${{ steps.quality_summary.outputs.summary_path }}
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/setup-extension-ci
        with:
          install-python-tools: 'true'
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck
      - name: ESLint
        id: eslint
        if: always()
        continue-on-error: true
        run: pnpm lint
      - name: Vitest
        id: vitest
        if: always()
        continue-on-error: true
        run: pnpm test
      - name: Python regression tests
        id: python_tests
        if: always()
        continue-on-error: true
        run: python -m pytest tests/ -v --tb=short
      - name: Summarize quality gates without failing early
        id: quality_summary
        if: always()
        env:
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          ESLINT_OUTCOME: ${{ steps.eslint.outcome }}
          VITEST_OUTCOME: ${{ steps.vitest.outcome }}
          PYTHON_TESTS_OUTCOME: ${{ steps.python_tests.outcome }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const results = [
            ['typecheck', process.env.TYPECHECK_OUTCOME],
            ['eslint', process.env.ESLINT_OUTCOME],
            ['vitest', process.env.VITEST_OUTCOME],
            ['python-tests', process.env.PYTHON_TESTS_OUTCOME],
          ].map(([name, outcome]) => ({ name, outcome: outcome || 'skipped' }));
          const failed = results.some((item) => item.outcome !== 'success');
          fs.mkdirSync('.ci-results', { recursive: true });
          const reportPath = '.ci-results/quality-gates.json';
          fs.writeFileSync(reportPath, JSON.stringify({ failed, results }, null, 2));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            '### Quality gates',
            '',
            'All quality checks ran with `continue-on-error` so the pipeline can expose every failure before the final result job fails.',
            '',
            '| Check | Outcome |',
            '| --- | --- |',
            ...results.map((item) => `| ${item.name} | ${item.outcome} |`),
            '',
          ].join('\n'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `failed=${failed ? 'true' : 'false'}\nsummary_path=${reportPath}\n`);
          NODE
      - name: Upload quality gate report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-quality-gates-${{ github.run_number }}
          path: .ci-results/quality-gates.json
          if-no-files-found: warn
          retention-days: 14

  package-build:
    name: Build once, validate, and stage Chrome Edge Firefox packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [preflight, quality-gates]
    if: ${{ always() && needs.preflight.result == 'success' }}
    outputs:
      ext_version: ${{ steps.version.outputs.ext_version }}
      release_tag: ${{ steps.package_version.outputs.release_tag }}
      failed: ${{ steps.package_summary.outputs.failed }}
      has_unpacked: ${{ steps.package_summary.outputs.has_unpacked }}
      has_release_assets: ${{ steps.package_summary.outputs.has_release_assets }}
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-extension-ci
      - name: Resolve package version override
        id: package_version
        env:
          RELEASE_TAG: ${{ inputs.release_tag || '' }}
          VERSION_OVERRIDE: ${{ inputs.version_override || '' }}
        run: |
          set -euo pipefail
          VERSION_ARG=""
          RELEASE_TAG_OUT=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${RELEASE_TAG}" ]]; then
            VERSION_ARG="${RELEASE_TAG}"
            RELEASE_TAG_OUT="${RELEASE_TAG}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_ARG="${GITHUB_REF_NAME}"
            RELEASE_TAG_OUT="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${VERSION_OVERRIDE}" ]]; then
            VERSION_ARG="${VERSION_OVERRIDE}"
          fi

          if [[ -n "$VERSION_ARG" ]]; then
            RAW_VERSION="${VERSION_ARG#v}"
            NUMERIC_VERSION_RE='^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'
            PRERELEASE_VERSION_RE='^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z][0-9A-Za-z.-]*(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'
            if [[ ! "$RAW_VERSION" =~ $NUMERIC_VERSION_RE && ! "$RAW_VERSION" =~ $PRERELEASE_VERSION_RE ]]; then
              echo "::error::Invalid release version '$VERSION_ARG'. Use tags like vX.Y.Z, vX.Y.Z.N, or vX.Y.Z-beta.N."
              exit 1
            fi
          fi
          echo "version_arg=$VERSION_ARG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG_OUT" >> "$GITHUB_OUTPUT"
      - name: Build Chrome Edge Firefox packages once and run release gates
        id: release_checks
        continue-on-error: true
        env:
          VERSION_ARG: ${{ steps.package_version.outputs.version_arg }}
        run: |
          set -euo pipefail
          args=(--package-only)
          if [[ -n "$VERSION_ARG" ]]; then
            args+=(--version "$VERSION_ARG")
          fi
          node tools/run-release-checks.js "${args[@]}"
      - name: Build store profile once
        id: store_build
        if: always()
        continue-on-error: true
        run: pnpm build:store
      - name: Validate release using existing build
        id: reuse_build_gates
        if: always()
        continue-on-error: true
        run: pnpm verify:release:reuse-build
      - name: Note production signoff is intentionally not duplicated here
        if: always()
        run: |
          echo "Production signoff is covered by preflight/quality/package/E2E gates in CI."
          echo "Run the standalone production signoff locally when you need an end-to-end local release gate."
      - name: Read built manifest version
        id: version
        if: always()
        run: |
          set -euo pipefail
          if [[ -f dist/chromium/manifest.json ]]; then
            VER=$(node -e "console.log(require('./dist/chromium/manifest.json').version)")
          else
            VER="0.0.0"
            echo "::warning::dist/chromium/manifest.json was not produced; release packaging failed before version extraction."
          fi
          echo "ext_version=$VER" >> "$GITHUB_OUTPUT"
          echo "Extension manifest version: $VER"
      - name: Summarize package and release gates without failing early
        id: package_summary
        if: always()
        env:
          RELEASE_CHECKS_OUTCOME: ${{ steps.release_checks.outcome }}
          STORE_BUILD_OUTCOME: ${{ steps.store_build.outcome }}
          REUSE_BUILD_GATES_OUTCOME: ${{ steps.reuse_build_gates.outcome }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const results = [
            ['release-checks', process.env.RELEASE_CHECKS_OUTCOME],
            ['store-build', process.env.STORE_BUILD_OUTCOME],
            ['reuse-build-gates', process.env.REUSE_BUILD_GATES_OUTCOME],
          ].map(([name, outcome]) => ({ name, outcome: outcome || 'skipped' }));
          const failed = results.some((item) => item.outcome !== 'success');
          const hasUnpacked = fs.existsSync('dist/chromium/manifest.json');
          const hasReleaseAssets = fs.existsSync('dist/release-assets') && fs.readdirSync('dist/release-assets').length > 0;
          fs.mkdirSync('.ci-results', { recursive: true });
          fs.writeFileSync('.ci-results/package-build.json', JSON.stringify({ failed, hasUnpacked, hasReleaseAssets, results }, null, 2));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            '### Package and release gates',
            '',
            'Package checks use `continue-on-error`; the final pipeline job is responsible for failing the workflow after all diagnosable gates run.',
            '',
            `Unpacked Chromium build available: ${hasUnpacked}`,
            `Release assets available: ${hasReleaseAssets}`,
            '',
            '| Check | Outcome |',
            '| --- | --- |',
            ...results.map((item) => `| ${item.name} | ${item.outcome} |`),
            '',
          ].join('\n'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, [
            `failed=${failed ? 'true' : 'false'}`,
            `has_unpacked=${hasUnpacked ? 'true' : 'false'}`,
            `has_release_assets=${hasReleaseAssets ? 'true' : 'false'}`,
            '',
          ].join('\n'));
          NODE
      - name: Upload browser packages and release metadata
        if: always() && steps.package_summary.outputs.has_release_assets == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nova-browser-extension-packages
          path: dist/release-assets/*
          if-no-files-found: warn
          retention-days: 90
      - name: Upload unpacked browser builds for downstream smoke tests
        if: always() && steps.package_summary.outputs.has_unpacked == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nova-browser-extension-unpacked
          path: |
            dist/chromium/**
            dist/edge/**
            dist/firefox/**
          if-no-files-found: warn
          retention-days: 14
      - name: Upload package gate report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-package-build-${{ github.run_number }}
          path: .ci-results/package-build.json
          if-no-files-found: warn
          retention-days: 14

  browser-e2e:
    name: Browser E2E smoke on built Chromium artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [preflight, package-build]
    if: ${{ always() && needs.preflight.result == 'success' && needs.package-build.outputs.has_unpacked == 'true' }}
    outputs:
      failed: ${{ steps.e2e_summary.outputs.failed }}
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v6.0.3
      - uses: ./.github/actions/setup-extension-ci
        with:
          install-playwright: 'true'
      - name: Download unpacked browser builds
        uses: actions/download-artifact@v8.0.1
        with:
          name: nova-browser-extension-unpacked
          path: dist
      - name: Run Playwright smoke tests against the existing Chromium build
        id: playwright
        continue-on-error: true
        env:
          EXTENSION_UNPACKED_DIR: dist/chromium
        run: pnpm test:e2e
      - name: Summarize browser E2E without failing early
        id: e2e_summary
        if: always()
        env:
          PLAYWRIGHT_OUTCOME: ${{ steps.playwright.outcome }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const outcome = process.env.PLAYWRIGHT_OUTCOME || 'skipped';
          const failed = outcome !== 'success';
          fs.mkdirSync('.ci-results', { recursive: true });
          fs.writeFileSync('.ci-results/browser-e2e.json', JSON.stringify({ failed, results: [{ name: 'playwright-smoke', outcome }] }, null, 2));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            '### Browser E2E',
            '',
            '| Check | Outcome |',
            '| --- | --- |',
            `| playwright-smoke | ${outcome} |`,
            '',
          ].join('\n'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `failed=${failed ? 'true' : 'false'}\n`);
          NODE
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
            .ci-results/browser-e2e.json
          if-no-files-found: ignore
          retention-days: 14

  pipeline-result:
    name: Pipeline result
    if: always()
    needs: [preflight, quality-gates, package-build, browser-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Collect job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const needs = JSON.parse(process.env.NEEDS_JSON);
          const rows = Object.entries(needs).map(([name, value]) => ({
            name,
            result: value.result,
            outputs: value.outputs || {},
          }));
          const failed = [];
          for (const row of rows) {
            if (!['success', 'skipped'].includes(row.result)) {
              failed.push(`${row.name}=${row.result}`);
            }
            if (row.outputs.failed === 'true') {
              failed.push(`${row.name}=failed-gates`);
            }
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            '### NOVA Browser Extension Pipeline',
            '',
            'The pipeline is configured to collect all diagnosable failures first, then fail here at the end.',
            '',
            '| Job | Result | Gate output |',
            '| --- | --- | --- |',
            ...rows.map((row) => `| ${row.name} | ${row.result} | ${row.outputs.failed || 'n/a'} |`),
            '',
          ].join('\n'));
          if (failed.length) {
            console.error(`Pipeline failed after collecting all available gates: ${failed.join(', ')}`);
            process.exit(1);
          }
          NODE

  release:
    name: Publish GitHub Release
    if: >-
      always() &&
      needs.pipeline-result.result == 'success' &&
      needs.package-build.result == 'success' &&
      (
        (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
      )
    needs: [pipeline-result, package-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0
      - name: Download packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: nova-browser-extension-packages
          path: release-assets
      - name: Prepare release notes with downloads and changelog
        id: notes
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          EXT_VERSION: ${{ needs.package-build.outputs.ext_version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.release_tag || github.ref_name }}
          RELEASE_DOWNLOAD_BASE: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ inputs.release_tag || github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_ACTOR: ${{ github.actor }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node tools/prepare-release-notes.mjs --assets release-assets --output release-notes
      - name: Publish or update release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: NOVA Browser Extension ${{ inputs.release_tag || github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
      - name: Upload release notes artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nova-browser-extension-release-notes-${{ github.run_number }}
          path: release-notes/*
          if-no-files-found: error
          retention-days: 90

  telegram-release:
    name: Telegram tag release notification
    needs: [release, package-build]
    if: >-
      always() &&
      needs.release.result == 'success' &&
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0
      - name: Download packages
        uses: actions/download-artifact@v8.0.1
        with:
          name: nova-browser-extension-packages
          path: release-assets
      - name: Prepare release notification payload
        id: notes
        env:
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          EXT_VERSION: ${{ needs.package-build.outputs.ext_version }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.release_tag || github.ref_name }}
          RELEASE_DOWNLOAD_BASE: ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ inputs.release_tag || github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_ACTOR: ${{ github.actor }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node tools/prepare-release-notes.mjs --assets release-assets --output telegram-release-notes
      - name: Notify Telegram for tag release
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_NOTIFICATION_FILE: ${{ steps.notes.outputs.notification_path }}
        run: python3 scripts/telegram-release-notify.py
