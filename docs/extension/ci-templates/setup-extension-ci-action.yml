name: Setup NOVA Browser Extension CI
description: Setup Node.js, pnpm, Python tooling, and optional Playwright browsers for the NOVA integrated repository browser-extension workflow template.
inputs:
  install-deps:
    description: Install Node dependencies with pnpm. Compatibility alias for install-node-deps.
    required: false
    default: 'true'
  install-node-deps:
    description: Install Node dependencies with pnpm.
    required: false
    default: 'true'
  install-python-tools:
    description: Install Python QA tools used by the NOVA Browser Extension pipeline.
    required: false
    default: 'false'
  install-playwright:
    description: Install Playwright Chromium browser dependencies.
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6.0.9
      with:
        version: 11.6.0

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .node-version
        # setup-node v5 auto-enables package-manager cache when packageManager is present.
        # This repository intentionally allows first CI runs without pnpm-lock.yaml,
        # so caching must stay disabled until a lockfile is committed.
        package-manager-cache: false

    - name: Cache Rust dependencies when present
      if: ${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') != '' }}
      uses: Swatinem/rust-cache@v2.9.1
      with:
        cache-bin: 'false'

    - name: Install dependencies
      if: inputs.install-deps == 'true' && inputs.install-node-deps == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [ -f pnpm-lock.yaml ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install --no-frozen-lockfile
        fi

    - name: Install Python tools
      if: inputs.install-python-tools == 'true'
      shell: bash
      run: python -m pip install --upgrade pytest ruff

    - name: Install Playwright Chromium
      if: inputs.install-playwright == 'true'
      shell: bash
      run: pnpm exec playwright install --with-deps chromium
