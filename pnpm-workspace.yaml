packages:
  - .
  - browser-extension

# Root package orchestrates desktop, daemon, installer, and browser-extension packages as one workspace.
# The browser extension keeps an extension-local package.json for WXT commands, but dependency
# resolution, lockfile policy, CI, and maintenance are centralized at the repository root.
engineStrict: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAge: 1440
verifyDepsBeforeRun: warn
# Resolve each package's peer dependencies from its own subtree instead of the
# workspace root. The desktop root uses vite 6 while the browser extension's
# wxt toolchain uses vite 8; without this, a lockfile re-resolution mis-pairs
# @vitejs/plugin-react (pulled by @wxt-dev/module-react) with the root's vite 6
# and breaks `wxt prepare` (vite "./internal" export not found).
resolvePeersFromWorkspaceRoot: false

overrides:
  "uuid@^8.3.0": "11.1.1"

allowBuilds:
  esbuild: true
  playwright: true
  spawn-sync: true
  unrs-resolver: true
