packages:
  - .
  - browser-extension

# Root package orchestrates desktop, daemon, installer, and browser-extension packages as one workspace.
# The browser extension keeps an extension-local package.json for WXT commands, but dependency
# resolution, lockfile policy, CI, and maintenance are centralized at the repository root.
engineStrict: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAge: 1440
verifyDepsBeforeRun: warn

overrides:
  "uuid@^8.3.0": "11.1.1"

allowBuilds:
  esbuild: true
  playwright: true
  spawn-sync: true
  unrs-resolver: true
