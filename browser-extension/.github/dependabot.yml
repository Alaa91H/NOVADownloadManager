version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      extension-tooling:
        patterns:
          - wxt
          - '@wxt-dev/*'
          - typescript
          - vitest
          - '@playwright/*'
          - eslint
          - '@typescript-eslint/*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
