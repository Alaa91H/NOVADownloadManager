packages:
  - .

# pnpm v11 reads project settings from pnpm-workspace.yaml, not package.json#pnpm or
# pnpm-specific .npmrc entries. Keep the install policy explicit and deterministic.
engineStrict: true
strictPeerDependencies: false
autoInstallPeers: true
minimumReleaseAge: 1440
verifyDepsBeforeRun: warn
overrides:
  "uuid@^8.3.0": "11.1.1"
allowBuilds:
  esbuild: true
  playwright: true
  spawn-sync: true
  unrs-resolver: true
